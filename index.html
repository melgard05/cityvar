<style>
  :root{
    --bg-0:#090d1a;
    --bg-1:#0e1426;
    --surface:#141b30;
    --surface-2:#192243;
    --line:#28324f;
    --line-soft:#1d2640;
    --ink:#eef1f8;
    --ink-mute:#94a1c2;
    --ink-faint:#5e6a89;
    --gold:#c9a24b;
    --chrome-a:#7ce0ff;
    --chrome-b:#b08bff;
    --have:#46e3a0;
    --row-have:#0f2030;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #16203c 0%, rgba(22,32,60,0) 60%),
      linear-gradient(180deg,var(--bg-0),var(--bg-1));
    color:var(--ink);
    font-family:var(--sans);
    font-size:15px;
    line-height:1.45;
    min-height:100vh;
    -webkit-text-size-adjust:100%;
  }
  .wrap{
    max-width:980px;margin:0 auto;
    padding:
      env(safe-area-inset-top) calc(16px + env(safe-area-inset-right))
      calc(80px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
  }

  /* ---------- Masthead ---------- */
  header.mast{
    padding:30px 0 14px;
    text-align:center;
    position:relative;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 10px;
  }
  .title{
    margin:0;
    font-weight:800;
    font-size:clamp(26px,6vw,46px);
    letter-spacing:.02em;
    line-height:1.02;
    text-transform:uppercase;
    background:linear-gradient(180deg,#ffffff 0%,#c4cde6 70%,#8f9bc0 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .subtitle{
    font-family:var(--serif);
    font-style:italic;
    color:var(--ink-mute);
    margin:8px 0 0;
    font-size:clamp(13px,2.4vw,16px);
  }
  /* skyline signature */
  .skyline{display:block;width:100%;height:46px;margin:14px 0 0;opacity:.6}
  .rule{
    height:1px;width:100%;margin:0 0 4px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:.7;
  }

  /* ---------- Progress ---------- */
  .progress-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
    margin:18px 0 14px;
    display:flex;
    align-items:center;
    gap:18px;
    flex-wrap:wrap;
  }
  .count{
    font-family:var(--mono);
    font-size:30px;
    font-weight:700;
    line-height:1;
    white-space:nowrap;
  }
  .count small{font-size:15px;color:var(--ink-faint);font-weight:500}
  .pct{
    font-family:var(--mono);
    font-size:13px;
    color:var(--ink-mute);
    margin-top:6px;
  }
  .bar-shell{flex:1 1 220px;min-width:180px}
  .bar-track{
    height:12px;border-radius:8px;background:#0a1122;
    border:1px solid var(--line-soft);overflow:hidden;
  }
  .bar-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg,var(--chrome-a),var(--chrome-b));
    box-shadow:0 0 14px rgba(124,224,255,.45);
    transition:width .35s ease;
  }

  /* ---------- Controls ---------- */
  .controls{
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;
    margin:0 0 14px;
  }
  .search{flex:1 1 220px;min-width:160px;position:relative}
  .search input{
    width:100%;padding:10px 12px;border-radius:10px;
    background:var(--surface);border:1px solid var(--line);
    color:var(--ink);font-size:14px;font-family:var(--sans);
  }
  .search input::placeholder{color:var(--ink-faint)}
  select{
    padding:10px 12px;border-radius:10px;
    background:var(--surface);border:1px solid var(--line);
    color:var(--ink);font-size:14px;font-family:var(--sans);
    cursor:pointer;max-width:230px;
  }
  .seg{
    display:inline-flex;border:1px solid var(--line);border-radius:10px;
    overflow:hidden;background:var(--surface);
  }
  .seg button{
    border:0;background:transparent;color:var(--ink-mute);
    padding:10px 13px;font-size:13px;cursor:pointer;font-family:var(--sans);
    border-right:1px solid var(--line-soft);
  }
  .seg button:last-child{border-right:0}
  .seg button[aria-pressed="true"]{
    background:var(--surface-2);color:var(--ink);font-weight:600;
  }
  input,select,button{outline-offset:2px}
  input:focus-visible,select:focus-visible,button:focus-visible{
    outline:2px solid var(--chrome-a);
  }

  /* ---------- Table ---------- */
  .tablecard{
    background:var(--surface);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;
  }
  table{width:100%;border-collapse:collapse}
  thead th{
    position:sticky;top:0;z-index:2;
    background:var(--surface-2);
    color:var(--ink-mute);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    font-weight:600;text-align:left;
    padding:11px 12px;border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  thead th.sortable{cursor:pointer;user-select:none}
  thead th.sortable:hover{color:var(--ink)}
  th .arrow{color:var(--gold);font-size:10px;margin-left:4px}
  tbody tr{
    border-bottom:1px solid var(--line-soft);cursor:pointer;
    transition:background .12s ease;
  }
  tbody tr:last-child{border-bottom:0}
  tbody tr:hover{background:#10182c}
  tbody tr.have{background:var(--row-have)}
  tbody tr.have:hover{background:#13263a}
  td{padding:11px 12px;vertical-align:middle}
  td.cb{width:42px;text-align:center}
  td.num{
    width:74px;font-family:var(--mono);font-size:12.5px;color:var(--ink-mute);
    white-space:nowrap;
  }
  td.player{font-weight:600}
  tr.have td.player{color:var(--have)}
  td.team{color:var(--ink-mute);font-size:13.5px}
  .box{
    width:20px;height:20px;border-radius:6px;
    border:1.5px solid var(--line);background:#0b1326;
    display:inline-flex;align-items:center;justify-content:center;
    color:transparent;font-size:13px;line-height:1;
    transition:all .12s ease;
  }
  tr.have .box{
    background:linear-gradient(135deg,var(--chrome-a),var(--chrome-b));
    border-color:transparent;color:#06101e;font-weight:900;
    box-shadow:0 0 10px rgba(124,224,255,.4);
  }
  .empty{padding:40px 16px;text-align:center;color:var(--ink-faint)}

  /* ---------- Footer actions ---------- */
  .actions{
    display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 0;
    justify-content:space-between;align-items:center;
  }
  .act-group{display:flex;gap:10px;flex-wrap:wrap}
  .btn{
    border:1px solid var(--line);background:var(--surface);
    color:var(--ink);padding:9px 15px;border-radius:10px;
    font-size:13px;cursor:pointer;font-family:var(--sans);
  }
  .btn:hover{background:var(--surface-2)}
  .btn.danger{color:#ff9a9a;border-color:#46263a}
  .btn.danger:hover{background:#2a1622}
  .hint{color:var(--ink-faint);font-size:12px;font-family:var(--mono)}

  /* ---------- Install banner ---------- */
  .install{
    display:none;align-items:center;gap:12px;flex-wrap:wrap;
    background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;margin:0 0 14px;
  }
  .install.show{display:flex}
  .install .ic{
    width:34px;height:34px;border-radius:8px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--chrome-a),var(--chrome-b));
  }
  .install .msg{flex:1 1 200px;font-size:13.5px;color:var(--ink-mute)}
  .install .msg b{color:var(--ink)}
  .install .btn-row{display:flex;gap:8px}
  .install .x{
    background:transparent;border:0;color:var(--ink-faint);
    font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;
  }

  @media (max-width:560px){
    td.team{font-size:12.5px}
    .count{font-size:24px}
    thead th{padding:10px 8px}
    td{padding:10px 8px}
    .subtitle{display:none}
  }
  @media print{
    body{background:#fff;color:#000}
    .controls,.actions,.progress-card .bar-shell,.skyline{display:none}
    .tablecard,.progress-card{border:1px solid #ccc;background:#fff}
    thead th{background:#eee;color:#000}
    tr.have{background:#f1f1f1 !important}
    tr.have td.player{color:#000}
    .box{border-color:#999}
    tr.have .box{background:#000;color:#fff;box-shadow:none}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="mast">
    <p class="eyebrow">2025 Topps Chrome Platinum &bull; '55 Anniversary</p>
    <h1 class="title">City Variations</h1>
    <p class="subtitle">Hobby-exclusive short prints &bull; 80-card skyline set &bull; 55CV-1 to 55CV-80</p>
    <svg class="skyline" viewBox="0 0 1000 46" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#5f6f99"/>

        </linearGradient>
      </defs>
      <path fill="url(#sg)" d="M0,46 L0,30 L24,30 L24,20 L40,20 L40,30 L66,30 L66,12 L74,8 L82,12 L82,30 L104,30 L104,24 L120,24 L120,14 L132,14 L132,24 L150,24 L150,32 L172,32 L172,18 L180,18 L180,6 L188,6 L188,18 L196,18 L196,32 L220,32 L220,22 L240,22 L240,30 L262,30 L262,16 L278,16 L278,30 L300,30 L300,26 L300,26 L322,26 L322,10 L334,10 L334,26 L356,26 L356,20 L376,20 L376,30 L398,30 L398,14 L408,14 L408,4 L416,4 L416,14 L426,14 L426,30 L448,30 L448,24 L468,24 L468,32 L490,32 L490,18 L506,18 L506,32 L528,32 L528,22 L548,22 L548,28 L570,28 L570,12 L582,12 L582,28 L604,28 L604,20 L624,20 L624,30 L646,30 L646,16 L654,10 L662,16 L662,30 L686,30 L686,24 L704,24 L704,14 L716,14 L716,24 L736,24 L736,32 L758,32 L758,18 L768,18 L768,8 L776,8 L776,18 L786,18 L786,32 L808,32 L808,22 L828,22 L828,30 L850,30 L850,14 L866,14 L866,30 L888,30 L888,26 L908,26 L908,18 L920,18 L920,26 L940,26 L940,30 L962,30 L962,20 L982,20 L982,30 L1000,30 L1000,46 Z"/>
    </svg>
    <div class="rule"></div>
  </header>

  <section class="progress-card">
    <div>
      <div class="count"><span id="haveCount">0</span><small> / 80</small></div>
      <div class="pct" id="pctLabel">0% complete</div>
    </div>
    <div class="bar-shell">
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    </div>
  </section>

  <div class="install" id="installBar" role="region" aria-label="Install app">
    <span class="ic" aria-hidden="true"></span>
    <span class="msg" id="installMsg"><b>Add to your home screen</b> to use this as an app, offline.</span>
    <span class="btn-row" id="installBtnRow"></span>
    <button class="x" id="installClose" aria-label="Dismiss">&times;</button>
  </div>

  <div class="controls">
    <label class="search">
      <input id="search" type="search" placeholder="Search player or team…" autocomplete="off">
    </label>
    <select id="teamFilter" aria-label="Filter by team"></select>
    <div class="seg" role="group" aria-label="Show">
      <button data-show="all" aria-pressed="true">All</button>
      <button data-show="need">Need</button>
      <button data-show="have">Have</button>
    </div>
  </div>

  <div class="tablecard">
    <table>
      <thead>
        <tr>
          <th class="cb"></th>
          <th class="sortable num" data-key="number">No. <span class="arrow" data-arrow="number"></span></th>
          <th class="sortable" data-key="player">Player <span class="arrow" data-arrow="player"></span></th>
          <th class="sortable" data-key="team">Team <span class="arrow" data-arrow="team"></span></th>
          <th class="sortable cb" data-key="have" title="Sort by collected">&#10003; <span class="arrow" data-arrow="have"></span></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="emptyMsg" hidden>No cards match this filter.</div>
  </div>

  <div class="actions">
    <div class="act-group">
      <button class="btn" id="exportBtn">Export CSV</button>
      <button class="btn" id="needBtn">Copy needed list</button>
      <button class="btn" id="printBtn">Print</button>
    </div>
    <div class="act-group">
      <span class="hint" id="saveHint"></span>
      <button class="btn danger" id="resetBtn">Reset all</button>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---- Checklist data: 2025 Topps Chrome Platinum '55 — City Variations (55CV) ----
  var RAW = [
    [1,"Mike Trout","Los Angeles Angels"],
    [2,"Rod Carew","California Angels"],
    [3,"Randy Johnson","Arizona Diamondbacks"],
    [4,"Corbin Carroll","Arizona Diamondbacks"],
    [5,"Reggie Jackson","Oakland Athletics"],
    [6,"Rickey Henderson","Oakland Athletics"],
    [7,"Ronald Acuña Jr.","Atlanta Braves"],

    [9,"Gunnar Henderson","Baltimore Orioles"],

    [11,"Ted Williams","Boston Red Sox"],
    [12,"Rafael Devers","Boston Red Sox"],

    [16,"Luis Robert Jr.","Chicago White Sox"],
    [17,"Johnny Bench","Cincinnati Reds"],
    [18,"Elly De La Cruz","Cincinnati Reds"],
    [19,"Bob Feller","Cleveland Guardians"],
    [20,"José Ramírez","Cleveland Guardians"],
    [21,"Todd Helton","Colorado Rockies"],
    [22,"Ezequiel Tovar","Colorado Rockies"],
    [23,"Miguel Cabrera","Detroit Tigers"],
    [24,"Tarik Skubal","Detroit Tigers"],
    [25,"Craig Biggio","Houston Astros"],
    [26,"Yordan Alvarez","Houston Astros"],
    [27,"George Brett","Kansas City Royals"],
    [28,"Bobby Witt Jr.","Kansas City Royals"],
    [29,"Sandy Koufax","Los Angeles Dodgers"],
    [30,"Shohei Ohtani","Los Angeles Dodgers"],
    [31,"Don Mattingly","Miami Marlins"],
    [32,"Jazz Chisholm Jr.","Miami Marlins"],
    [33,"Robin Yount","Milwaukee Brewers"],
    [34,"Jackson Chourio","Milwaukee Brewers"],
    [35,"Joe Mauer","Minnesota Twins"],
    [36,"Royce Lewis","Minnesota Twins"],
    [37,"Tom Seaver","New York Mets"],
    [38,"Francisco Lindor","New York Mets"],
    [39,"Babe Ruth","New York Yankees"],
    [40,"Aaron Judge","New York Yankees"],
    [41,"Rickey Henderson","New York Yankees"],
    [42,"Mark McGwire","Oakland Athletics"],
    [43,"Mike Schmidt","Philadelphia Phillies"],
    [44,"Bryce Harper","Philadelphia Phillies"],
    [45,"Roberto Clemente","Pittsburgh Pirates"],
    [46,"Paul Skenes","Pittsburgh Pirates"],
    [47,"Tony Gwynn","San Diego Padres"],
    [48,"Jackson Merrill","San Diego Padres"],
    [49,"Willie Mays","San Francisco Giants"],
    [50,"Buster Posey","San Francisco Giants"],
    [51,"Ichiro","Seattle Mariners"],
    [52,"Julio Rodríguez","Seattle Mariners"],
    [53,"Stan Musial","St. Louis Cardinals"],
    [54,"Paul Goldschmidt","St. Louis Cardinals"],
    [55,"Ted Williams","Washington Senators"],
    [56,"CJ Abrams","Washington Nationals"],
    [57,"Nolan Ryan","Houston Astros"],
    [58,"Nolan Ryan","Texas Rangers"],
    [59,"Vladimir Guerrero Jr.","Toronto Blue Jays"],
    [60,"Roy Halladay","Toronto Blue Jays"],
    [61,"Ken Griffey Jr.","Seattle Mariners"],
    [62,"Derek Jeter","New York Yankees"],
    [63,"Chipper Jones","Atlanta Braves"],
    [64,"Will Clark","San Francisco Giants"],
    [65,"Ichiro","Seattle Mariners"],
    [66,"Barry Larkin","Cincinnati Reds"],
    [67,"Juan Soto","New York Yankees"],
    [68,"Ken Griffey Jr.","Cincinnati Reds"],
    [69,"Pedro Martinez","Boston Red Sox"],
    [70,"Clayton Kershaw","Los Angeles Dodgers"],
    [71,"Albert Pujols","St. Louis Cardinals"],
    [72,"Jose Altuve","Houston Astros"],
    [73,"Wade Boggs","Boston Red Sox"],
    [74,"Ken Griffey Jr.","Chicago White Sox"],
    [75,"Mariano Rivera","New York Yankees"],
    [76,"David Ortiz","Boston Red Sox"],
    [77,"Adrian Beltre","Texas Rangers"],
    [78,"Carlton Fisk","Chicago White Sox"],
    [79,"Mookie Betts","Los Angeles Dodgers"],
    [80,"Manny Ramirez","Boston Red Sox"]
  ];

  var CARDS = RAW.map(function(r){
    return { number:r[0], id:"55CV-"+r[0], player:r[1], team:r[2] };
  });
  var TOTAL = CARDS.length;
  var STORE_KEY = "tcpp55_cityvar_v1";

  // ---- Persistence (localStorage with safe fallback for sandboxed previews) ----
  var owned = {};
  var memOnly = false;
  try {
    var saved = window.localStorage.getItem(STORE_KEY);
    if (saved) owned = JSON.parse(saved) || {};
  } catch(e){ memOnly = true; }

  function save(){
    if (memOnly) return;
    try { window.localStorage.setItem(STORE_KEY, JSON.stringify(owned)); }
    catch(e){ memOnly = true; updateSaveHint(); }
  }

  // ---- State ----
  var state = { search:"", team:"", show:"all", sortKey:"number", sortDir:1 };

  // ---- Elements ----
  var $rows      = document.getElementById("rows");
  var $haveCount = document.getElementById("haveCount");
  var $pctLabel  = document.getElementById("pctLabel");
  var $barFill   = document.getElementById("barFill");
  var $search    = document.getElementById("search");
  var $teamFilter= document.getElementById("teamFilter");
  var $empty     = document.getElementById("emptyMsg");
  var $saveHint  = document.getElementById("saveHint");

  // ---- Build team dropdown (with live have/total counts) ----
  function teamList(){
    var seen = {};
    CARDS.forEach(function(c){ seen[c.team] = true; });
    return Object.keys(seen).sort();
  }
  function buildTeamFilter(){
    var current = state.team;
    var teams = teamList();
    var html = '<option value="">All teams ('+countHave()+'/'+TOTAL+')</option>';
    teams.forEach(function(t){
      var tot = CARDS.filter(function(c){return c.team===t;}).length;
      var have = CARDS.filter(function(c){return c.team===t && owned[c.id];}).length;
      html += '<option value="'+escapeAttr(t)+'">'+escapeHtml(t)+' ('+have+'/'+tot+')</option>';
    });
    $teamFilter.innerHTML = html;
    $teamFilter.value = current;
  }

  function countHave(){
    return CARDS.reduce(function(n,c){ return n + (owned[c.id]?1:0); },0);
  }

  // ---- Sorting + filtering ----
  function compare(a,b){
    var k = state.sortKey, d = state.sortDir;
    if (k === "number") return (a.number - b.number) * d;
    if (k === "have"){
      var av = owned[a.id]?1:0, bv = owned[b.id]?1:0;
      if (av !== bv) return (av - bv) * d;
      return a.number - b.number; // stable secondary
    }
    var av2 = (a[k]||"").toLowerCase(), bv2 = (b[k]||"").toLowerCase();
    if (av2 < bv2) return -1*d;
    if (av2 > bv2) return 1*d;
    return a.number - b.number;
  }

  function visibleCards(){
    var q = state.search.trim().toLowerCase();
    return CARDS.filter(function(c){
      if (state.team && c.team !== state.team) return false;
      if (state.show === "have" && !owned[c.id]) return false;
      if (state.show === "need" && owned[c.id]) return false;
      if (q){
        var hay = (c.player+" "+c.team+" "+c.id+" "+c.number).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    }).sort(compare);
  }

  // ---- Render ----
  function render(){
    var list = visibleCards();
    var html = "";
    for (var i=0;i<list.length;i++){
      var c = list[i];
      var has = !!owned[c.id];
      html += '<tr class="'+(has?'have':'')+'" data-id="'+c.id+'">'
        + '<td class="cb"><span class="box">&#10003;</span></td>'
        + '<td class="num">'+c.id+'</td>'
        + '<td class="player">'+escapeHtml(c.player)+'</td>'
        + '<td class="team">'+escapeHtml(c.team)+'</td>'
        + '<td class="cb"></td>'
        + '</tr>';
    }
    $rows.innerHTML = html;
    $empty.hidden = list.length !== 0;
    updateProgress();
    updateArrows();
  }

  function updateProgress(){
    var have = countHave();
    var pct = Math.round((have/TOTAL)*100);
    $haveCount.textContent = have;
    $pctLabel.textContent = pct + "% complete";
    $barFill.style.width = pct + "%";
  }

  function updateArrows(){
    var arrows = document.querySelectorAll("[data-arrow]");
    for (var i=0;i<arrows.length;i++){
      var key = arrows[i].getAttribute("data-arrow");
      arrows[i].textContent = (key === state.sortKey) ? (state.sortDir===1?"▲":"▼") : "";
    }
  }

  function updateSaveHint(){
    $saveHint.textContent = memOnly
      ? "Preview mode — saves won't persist here. Download the file to keep your progress."
      : "Saved on this device";
  }

  // ---- Events ----
  $rows.addEventListener("click", function(e){
    var tr = e.target.closest("tr[data-id]");
    if (!tr) return;
    var id = tr.getAttribute("data-id");
    owned[id] = !owned[id];
    save();
    // light-touch update: toggle row class + counts, then re-filter if needed
    if (state.show === "have" || state.show === "need" || state.sortKey === "have"){
      render();
    } else {
      tr.classList.toggle("have", !!owned[id]);
      updateProgress();
    }
    buildTeamFilter();
  });

  document.querySelectorAll("th.sortable").forEach(function(th){
    th.addEventListener("click", function(){
      var key = th.getAttribute("data-key");
      if (state.sortKey === key){ state.sortDir *= -1; }
      else { state.sortKey = key; state.sortDir = (key==="have") ? -1 : 1; }
      render();
    });
  });

  $search.addEventListener("input", function(){ state.search = $search.value; render(); });

  $teamFilter.addEventListener("change", function(){ state.team = $teamFilter.value; render(); });

  document.querySelectorAll(".seg button").forEach(function(b){
    b.addEventListener("click", function(){
      state.show = b.getAttribute("data-show");
      document.querySelectorAll(".seg button").forEach(function(x){
        x.setAttribute("aria-pressed", x===b ? "true":"false");
      });
      render();
    });
  });

  document.getElementById("resetBtn").addEventListener("click", function(){
    if (!confirm("Clear all collected marks? This can't be undone.")) return;
    owned = {}; save(); buildTeamFilter(); render();
  });

  document.getElementById("printBtn").addEventListener("click", function(){ window.print(); });

  document.getElementById("exportBtn").addEventListener("click", function(){
    var rows = [["Card","Number","Player","Team","Collected"]];
    CARDS.slice().sort(function(a,b){return a.number-b.number;}).forEach(function(c){
      rows.push([c.id, c.number, c.player, c.team, owned[c.id]?"Yes":"No"]);
    });
    var csv = rows.map(function(r){
      return r.map(function(v){
        v = String(v);
        return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
      }).join(",");
    }).join("\n");
    download("topps-chrome-platinum-55-city-variations.csv", csv, "text/csv");
  });

  document.getElementById("needBtn").addEventListener("click", function(){
    var need = CARDS.filter(function(c){return !owned[c.id];})
      .sort(function(a,b){return a.number-b.number;})
      .map(function(c){return c.id+"  "+c.player+" — "+c.team;});
    var text = need.length
      ? ("Still need ("+need.length+"):\n"+need.join("\n"))
      : "Complete set — nothing left to chase.";
    copyText(text);
  });

  // ---- Helpers ----
  function download(name, content, type){
    try{
      var blob = new Blob([content], {type:type+";charset=utf-8"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    }catch(e){ alert("Download blocked here. Open the saved file directly to export."); }
  }
  function copyText(text){
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){
        flash(document.getElementById("needBtn"), "Copied!");
      }, function(){ promptCopy(text); });
    } else { promptCopy(text); }
  }
  function promptCopy(text){ window.prompt("Copy your needed list:", text); }
  function flash(btn, msg){
    var old = btn.textContent; btn.textContent = msg;
    setTimeout(function(){ btn.textContent = old; }, 1200);
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>]/g,function(m){
      return {"&":"&amp;","<":"&lt;",">":"&gt;"}[m];
    });
  }
  function escapeAttr(s){ return escapeHtml(s).replace(/"/g,"&quot;"); }

  // ---- Init ----
  buildTeamFilter();
  render();
  updateSaveHint();

  // ---- Install prompt + service worker ----
  (function installFlow(){
    var bar = document.getElementById("installBar");
    var msg = document.getElementById("installMsg");
    var btnRow = document.getElementById("installBtnRow");
    var closeBtn = document.getElementById("installClose");
    var DISMISS_KEY = "tcpp55_install_dismissed";

    function dismissed(){
      try { return window.localStorage.getItem(DISMISS_KEY) === "1"; } catch(e){ return false; }
    }
    function setDismissed(){
      try { window.localStorage.setItem(DISMISS_KEY, "1"); } catch(e){}
    }
    function isStandalone(){
      return window.matchMedia("(display-mode: standalone)").matches
        || window.navigator.standalone === true;
    }
    function isiOS(){
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent)
        && !window.MSStream;
    }

    closeBtn.addEventListener("click", function(){ bar.classList.remove("show"); setDismissed(); });

    if (isStandalone() || dismissed()) return; // already installed or hushed

    // Android / Chromium: real install prompt
    var deferred = null;
    window.addEventListener("beforeinstallprompt", function(e){
      e.preventDefault();
      deferred = e;
      msg.innerHTML = "<b>Install this checklist</b> as an app on your phone.";
      var b = document.createElement("button");
      b.className = "btn"; b.textContent = "Install";
      b.addEventListener("click", function(){
        if (!deferred) return;
        deferred.prompt();
        deferred.userChoice.then(function(){ deferred = null; bar.classList.remove("show"); });
      });
      btnRow.appendChild(b);
      bar.classList.add("show");
    });
    window.addEventListener("appinstalled", function(){ bar.classList.remove("show"); setDismissed(); });

    // iOS Safari: no prompt event — show manual instructions
    if (isiOS()){
      msg.innerHTML = "<b>Add to Home Screen:</b> tap the Share button, then “Add to Home Screen.”";
      bar.classList.add("show");
    }
  })();

  if ("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){ /* offline cache unavailable; app still works online */ });
    });
  }
})();
</script>
</body>
</html>
